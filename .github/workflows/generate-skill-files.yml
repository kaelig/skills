name: Generate .skill files

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4

      - name: Remove existing .skill files
        run: rm -f *.skill

      - name: Generate .skill files from skill directories
        run: |
          for dir in */; do
            dir_name="${dir%/}"
            # Skip non-skill directories
            case "$dir_name" in
              .github|docs|node_modules) continue ;;
            esac
            # Only package directories that contain SKILL.md
            if [ -f "$dir_name/SKILL.md" ]; then
              zip -r "$dir_name.skill" "$dir_name/"
              echo "Packaged $dir_name.skill"
            fi
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.skill
          git diff --staged --quiet && echo "No changes to .skill files" && exit 0
          git commit -m "Generate .skill files [skip ci]"
          git push
